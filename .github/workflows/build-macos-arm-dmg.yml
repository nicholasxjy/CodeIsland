name: Build macOS ARM DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version written to the app bundle. Leave empty to use Info.plist.
        required: false
        type: string
      sign_and_notarize:
        description: Sign with Developer ID and notarize. Requires signing/notary secrets.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build ARM64 DMG
    runs-on: macos-15
    env:
      BUILD_ARCH: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ]; then
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version $VERSION"

      - name: Select Xcode 26
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -type d | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26 is required to compile AppIcon.icon"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          uname -m

      - name: Install DMG tooling
        run: |
          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi

      - name: Configure unsigned build
        if: ${{ !inputs.sign_and_notarize }}
        run: |
          echo "SKIP_SIGN=1" >> "$GITHUB_ENV"
          echo "SKIP_NOTARIZE=1" >> "$GITHUB_ENV"
          echo "::warning::Building an unsigned, non-notarized DMG. macOS Gatekeeper will block it after download unless quarantine is removed or the app is opened manually."

      - name: Validate signing inputs
        if: ${{ inputs.sign_and_notarize }}
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in CERTIFICATE_P12_BASE64 CERTIFICATE_P12_PASSWORD APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for sign_and_notarize"
              missing=1
            fi
          done
          exit "$missing"

      - name: Import Developer ID certificate
        if: ${{ inputs.sign_and_notarize }}
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          SIGN_IDENTITY_SECRET: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          if [ -n "$SIGN_IDENTITY_SECRET" ]; then
            echo "SIGN_IDENTITY=$SIGN_IDENTITY_SECRET" >> "$GITHUB_ENV"
          fi
          echo "SKIP_SIGN=0" >> "$GITHUB_ENV"
          echo "SKIP_NOTARIZE=0" >> "$GITHUB_ENV"

      - name: Store notary credentials
        if: ${{ inputs.sign_and_notarize }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials CodeIsland \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build DMG
        run: ./scripts/build-dmg.sh "$VERSION"

      - name: Verify ARM64 app binary
        run: |
          APP_ARCHS="$(lipo -archs .build/dmg-staging/CodeIsland.app/Contents/MacOS/CodeIsland)"
          HELPER_ARCHS="$(lipo -archs .build/dmg-staging/CodeIsland.app/Contents/Helpers/codeisland-bridge)"
          SPARKLE_ARCHS="$(lipo -archs .build/dmg-staging/CodeIsland.app/Contents/Frameworks/Sparkle.framework/Sparkle)"
          test "$APP_ARCHS" = "arm64"
          test "$HELPER_ARCHS" = "arm64"
          test "$SPARKLE_ARCHS" = "arm64"
          test -s .build/dmg-staging/CodeIsland.app/Contents/Resources/AppIcon.icns
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIconFile' .build/dmg-staging/CodeIsland.app/Contents/Info.plist)" = "AppIcon"
          codesign --verify --deep --strict --verbose=2 .build/dmg-staging/CodeIsland.app
          ls -lh .build/CodeIsland.dmg

      - name: Verify notarized app launch policy
        if: ${{ inputs.sign_and_notarize }}
        run: |
          spctl --assess --type execute --verbose=4 .build/dmg-staging/CodeIsland.app
          xcrun stapler validate .build/CodeIsland.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeIsland-macos-arm64-dmg
          path: .build/CodeIsland.dmg
          if-no-files-found: error
