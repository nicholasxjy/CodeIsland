<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080">
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181d"/>
      <stop offset="1" stop-color="#0d0f13"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8cff9f"/>
      <stop offset="1" stop-color="#34d05d"/>
    </linearGradient>
    <style>
      .label { font: 600 26px -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; fill: #f7f8fb; }
      .caption { font: 500 17px -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; fill: rgba(247,248,251,0.64); }
      .small { font: 600 13px "SF Mono", ui-monospace, Menlo, monospace; fill: rgba(255,255,255,0.72); letter-spacing: 0; }
      .mono { font: 700 15px "SF Mono", ui-monospace, Menlo, monospace; fill: #ffffff; letter-spacing: 0; }
      .tiny { font: 700 10px "SF Mono", ui-monospace, Menlo, monospace; fill: rgba(255,255,255,0.64); letter-spacing: 0; }
      .note { font: 500 15px -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; fill: rgba(247,248,251,0.62); }
      .callout { font: 650 16px -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; fill: #f7f8fb; }
    </style>
  </defs>

  <rect width="1440" height="1080" fill="#08090c"/>
  <rect x="64" y="64" width="1312" height="952" rx="34" fill="url(#screen)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="620" y="64" width="200" height="34" rx="16" fill="#020306"/>

  <text x="120" y="145" class="label">Yabai Space 信息在主 panel 的设计稿</text>
  <text x="120" y="176" class="caption">目标：在不打断现有 Codex 状态条的前提下，展示总 space 数、当前 space，并在切换后即时更新。</text>

  <text x="120" y="254" class="label">1. 收起态 compact bar</text>
  <text x="120" y="285" class="caption">优先放在右 wing，和现有 session count 形成两个短指标。</text>

  <g transform="translate(386 330)" filter="url(#shadow)">
    <path d="M0 13 Q0 0 14 0 H202 Q216 0 216 23 Q216 34 227 34 H539 Q550 34 550 23 Q550 0 564 0 H752 Q766 0 766 13 V38 Q766 62 742 62 H24 Q0 62 0 38 Z" fill="#020306"/>
    <rect x="21" y="14" width="34" height="34" rx="8" fill="#151a20" stroke="rgba(255,255,255,0.12)"/>
    <rect x="30" y="22" width="16" height="4" fill="#82ff92"/>
    <rect x="26" y="30" width="24" height="8" fill="#5d7cff"/>
    <rect x="30" y="42" width="6" height="4" fill="#82ff92"/>
    <rect x="42" y="42" width="6" height="4" fill="#82ff92"/>
    <text x="68" y="37" class="small">Bash</text>
    <text x="574" y="37" class="mono" fill="#77ff8b">1</text>
    <text x="589" y="37" class="mono" fill="rgba(255,255,255,0.38)">/</text>
    <text x="602" y="37" class="mono">3</text>
    <rect x="632" y="16" width="104" height="30" rx="6" fill="rgba(255,255,255,0.075)" stroke="rgba(255,255,255,0.12)"/>
    <circle cx="650" cy="31" r="4" fill="#77ff8b"/>
    <text x="661" y="36" class="mono">3</text>
    <text x="677" y="36" class="mono" fill="rgba(255,255,255,0.36)">/</text>
    <text x="690" y="36" class="mono">8</text>
    <text x="711" y="35" class="tiny">DEV</text>
  </g>

  <g transform="translate(860 252)">
    <path d="M0 28 C34 8 62 10 84 28" fill="none" stroke="#77ff8b" stroke-width="2" stroke-dasharray="6 5"/>
    <circle cx="85" cy="28" r="4" fill="#77ff8b"/>
    <text x="102" y="34" class="callout">新增 space pill</text>
    <text x="102" y="59" class="note">当前 space / 总数 + 可选 label</text>
  </g>

  <text x="120" y="505" class="label">2. 展开态 session list 顶部增加 Space Strip</text>
  <text x="120" y="536" class="caption">hover 展开后，第一行展示所有 spaces，当前项高亮；下方仍保留现有 session 列表。</text>

  <g transform="translate(430 585)" filter="url(#shadow)">
    <path d="M0 15 Q0 0 15 0 H178 Q193 0 193 28 Q193 42 207 42 H573 Q587 42 587 28 Q587 0 602 0 H765 Q780 0 780 15 V214 Q780 244 750 244 H30 Q0 244 0 214 Z" fill="#020306"/>
    <line x1="24" y1="70" x2="756" y2="70" stroke="rgba(255,255,255,0.14)" stroke-dasharray="5 4"/>

    <rect x="28" y="22" width="36" height="36" rx="9" fill="#151a20" stroke="rgba(255,255,255,0.12)"/>
    <rect x="38" y="31" width="16" height="4" fill="#82ff92"/>
    <rect x="34" y="39" width="24" height="8" fill="#5d7cff"/>
    <text x="82" y="45" class="mono">ALL</text>
    <text x="128" y="45" class="mono" fill="#77ff8b">STA</text>
    <text x="176" y="45" class="mono" fill="rgba(255,255,255,0.38)">CLI</text>

    <text x="506" y="45" class="tiny">sound</text>
    <circle cx="572" cy="37" r="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.10)"/>
    <text x="568" y="42" class="tiny">S</text>
    <circle cx="618" cy="37" r="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.10)"/>
    <text x="614" y="42" class="tiny">G</text>
    <circle cx="664" cy="37" r="14" fill="rgba(255,90,90,0.16)" stroke="rgba(255,90,90,0.32)"/>
    <text x="661" y="42" class="tiny">P</text>

    <g transform="translate(28 88)">
      <text x="0" y="15" class="small">SPACES</text>
      <text x="596" y="15" class="small">current: 3 / 8</text>
      <g transform="translate(0 31)">
        <rect x="0" y="0" width="64" height="30" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
        <text x="27" y="20" class="mono">1</text>
        <rect x="74" y="0" width="64" height="30" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
        <text x="101" y="20" class="mono">2</text>
        <rect x="148" y="0" width="98" height="30" rx="6" fill="url(#green)" stroke="rgba(255,255,255,0.18)"/>
        <text x="166" y="20" class="mono" fill="#031006">3 DEV</text>
        <rect x="256" y="0" width="64" height="30" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
        <text x="283" y="20" class="mono">4</text>
        <rect x="330" y="0" width="64" height="30" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
        <text x="357" y="20" class="mono">5</text>
        <rect x="404" y="0" width="64" height="30" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
        <text x="431" y="20" class="mono">6</text>
        <rect x="478" y="0" width="64" height="30" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
        <text x="505" y="20" class="mono">7</text>
        <rect x="552" y="0" width="92" height="30" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
        <text x="570" y="20" class="mono">8 WEB</text>
      </g>
    </g>

    <g transform="translate(28 170)">
      <rect x="0" y="0" width="724" height="48" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="21" class="small">CodeIsland</text>
      <text x="16" y="38" class="tiny">processing · Edit NotchPanelView.swift</text>
      <text x="634" y="30" class="mono" fill="#77ff8b">active</text>
    </g>
  </g>

  <text x="120" y="890" class="label">3. 切换反馈</text>
  <g transform="translate(120 922)">
    <rect x="0" y="0" width="1200" height="58" rx="10" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.08)"/>
    <text x="24" y="35" class="callout">yabai space change</text>
    <path d="M194 28 H285" stroke="rgba(255,255,255,0.35)" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="318" y="35" class="note">更新 compact pill：3/8 DEV -> 8/8 WEB</text>
    <path d="M612 28 H703" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <text x="736" y="35" class="note">如果 panel 已展开，同时移动 Space Strip 的高亮块</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="rgba(255,255,255,0.35)"/>
    </marker>
  </defs>
</svg>
