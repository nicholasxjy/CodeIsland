name: CodeIslandCompanion
options:
  bundleIdPrefix: top.fengye
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "6SLN844AVD"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "4"
    MARKETING_VERSION: "1.0.0"
targets:
  CodeIslandCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodeIslandCompanion
      - path: Shared
      - path: ../../Sources/CodeIsland/AntiGravityView.swift
      - path: ../../Sources/CodeIsland/BuddyView.swift
      - path: ../../Sources/CodeIsland/ClineView.swift
      - path: ../../Sources/CodeIsland/CopilotView.swift
      - path: ../../Sources/CodeIsland/CursorView.swift
      - path: ../../Sources/CodeIsland/DexView.swift
      - path: ../../Sources/CodeIsland/DroidView.swift
      - path: ../../Sources/CodeIsland/GeminiView.swift
      - path: ../../Sources/CodeIsland/HermesView.swift
      - path: ../../Sources/CodeIsland/KimiView.swift
      - path: ../../Sources/CodeIsland/OpenCodeView.swift
      - path: ../../Sources/CodeIsland/PixelCharacterView.swift
      - path: ../../Sources/CodeIsland/QoderView.swift
      - path: ../../Sources/CodeIsland/QwenView.swift
      - path: ../../Sources/CodeIsland/StepFunView.swift
      - path: ../../Sources/CodeIsland/TraeView.swift
      - path: ../../Sources/CodeIsland/WorkBuddyView.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.fengye.CodeIslandCompanion
        INFOPLIST_FILE: CodeIslandCompanion/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
    dependencies:
      - target: CodeIslandCompanionWidget
        embed: true
      - target: CodeIslandWatchApp
        embed: true
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
  CodeIslandCompanionWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodeIslandCompanionWidget
      - path: Shared
      - path: ../../Sources/CodeIsland/AntiGravityView.swift
      - path: ../../Sources/CodeIsland/BuddyView.swift
      - path: ../../Sources/CodeIsland/ClineView.swift
      - path: ../../Sources/CodeIsland/CopilotView.swift
      - path: ../../Sources/CodeIsland/CursorView.swift
      - path: ../../Sources/CodeIsland/DexView.swift
      - path: ../../Sources/CodeIsland/DroidView.swift
      - path: ../../Sources/CodeIsland/GeminiView.swift
      - path: ../../Sources/CodeIsland/HermesView.swift
      - path: ../../Sources/CodeIsland/KimiView.swift
      - path: ../../Sources/CodeIsland/OpenCodeView.swift
      - path: ../../Sources/CodeIsland/PixelCharacterView.swift
      - path: ../../Sources/CodeIsland/QoderView.swift
      - path: ../../Sources/CodeIsland/QwenView.swift
      - path: ../../Sources/CodeIsland/StepFunView.swift
      - path: ../../Sources/CodeIsland/TraeView.swift
      - path: ../../Sources/CodeIsland/WorkBuddyView.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.fengye.CodeIslandCompanion.Widget
        INFOPLIST_FILE: CodeIslandCompanionWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        SKIP_INSTALL: YES
  CodeIslandWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: CodeIslandWatchApp
      - path: CodeIslandCompanion/CompanionModels.swift
      - path: Shared/CompanionDisplayText.swift
      - path: Shared/SharedMascotView.swift
      - path: Shared/WatchStateStore.swift
      - path: ../../Sources/CodeIsland/AntiGravityView.swift
      - path: ../../Sources/CodeIsland/BuddyView.swift
      - path: ../../Sources/CodeIsland/ClineView.swift
      - path: ../../Sources/CodeIsland/CopilotView.swift
      - path: ../../Sources/CodeIsland/CursorView.swift
      - path: ../../Sources/CodeIsland/DexView.swift
      - path: ../../Sources/CodeIsland/DroidView.swift
      - path: ../../Sources/CodeIsland/GeminiView.swift
      - path: ../../Sources/CodeIsland/HermesView.swift
      - path: ../../Sources/CodeIsland/KimiView.swift
      - path: ../../Sources/CodeIsland/OpenCodeView.swift
      - path: ../../Sources/CodeIsland/PixelCharacterView.swift
      - path: ../../Sources/CodeIsland/QoderView.swift
      - path: ../../Sources/CodeIsland/QwenView.swift
      - path: ../../Sources/CodeIsland/StepFunView.swift
      - path: ../../Sources/CodeIsland/TraeView.swift
      - path: ../../Sources/CodeIsland/WorkBuddyView.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.fengye.CodeIslandCompanion.watchkitapp
        INFOPLIST_FILE: CodeIslandWatchApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: CodeIslandWatchApp/CodeIslandWatchApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
    dependencies:
      - target: CodeIslandWatchWidget
        embed: true
      - sdk: WatchConnectivity.framework
  CodeIslandWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: CodeIslandWatchWidget
      - path: CodeIslandCompanion/CompanionModels.swift
      - path: Shared/CompanionDisplayText.swift
      - path: Shared/SharedMascotView.swift
      - path: Shared/WatchStateStore.swift
      - path: ../../Sources/CodeIsland/AntiGravityView.swift
      - path: ../../Sources/CodeIsland/BuddyView.swift
      - path: ../../Sources/CodeIsland/ClineView.swift
      - path: ../../Sources/CodeIsland/CopilotView.swift
      - path: ../../Sources/CodeIsland/CursorView.swift
      - path: ../../Sources/CodeIsland/DexView.swift
      - path: ../../Sources/CodeIsland/DroidView.swift
      - path: ../../Sources/CodeIsland/GeminiView.swift
      - path: ../../Sources/CodeIsland/HermesView.swift
      - path: ../../Sources/CodeIsland/KimiView.swift
      - path: ../../Sources/CodeIsland/OpenCodeView.swift
      - path: ../../Sources/CodeIsland/PixelCharacterView.swift
      - path: ../../Sources/CodeIsland/QoderView.swift
      - path: ../../Sources/CodeIsland/QwenView.swift
      - path: ../../Sources/CodeIsland/StepFunView.swift
      - path: ../../Sources/CodeIsland/TraeView.swift
      - path: ../../Sources/CodeIsland/WorkBuddyView.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.fengye.CodeIslandCompanion.watchkitapp.Widget
        INFOPLIST_FILE: CodeIslandWatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: CodeIslandWatchWidget/CodeIslandWatchWidget.entitlements
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        SKIP_INSTALL: YES
  CodeIslandCompanionUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodeIslandCompanionUITests
      - path: CodeIslandCompanion/StandByLayout.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.fengye.CodeIslandCompanionUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CodeIslandCompanion
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: CodeIslandCompanion
schemes:
  CodeIslandCompanion:
    build:
      targets:
        CodeIslandCompanion: all
        CodeIslandCompanionWidget: all
        CodeIslandWatchApp: all
        CodeIslandWatchWidget: all
        CodeIslandCompanionUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CodeIslandCompanionUITests
